{% extends 'users/base.html' %}
{% block title %}Order Lab Test - {{ patient.get_full_name }}{% endblock %}
{% block content %}
<div class="card" style="max-width:700px; margin:2rem auto;">
    <h2 style="color:#2c3e50; margin-bottom:0.5rem;">🔬 Order Lab Test</h2>
    <p style="color:#7f8c8d; margin-bottom:2rem;">Patient: <strong>{{ patient.get_full_name }}</strong> ({{ patient.patient_id }})</p>

    <form method="post">
        {% csrf_token %}

        <div style="margin-bottom:1.25rem;">
            <label style="display:block; margin-bottom:0.5rem; font-weight:bold;">Test Name *</label>
            <input type="text" name="test_name" required placeholder="e.g., Complete Blood Count (CBC)"
                   style="width:100%; padding:0.75rem; border:1px solid #ddd; border-radius:4px;">
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1.25rem;">
            <div>
                <label style="display:block; margin-bottom:0.5rem; font-weight:bold;">Category *</label>
                <select name="category" required style="width:100%; padding:0.75rem; border:1px solid #ddd; border-radius:4px;">
                    <option value="">Select category...</option>
                    {% for value, label in category_choices %}
                    <option value="{{ value }}">{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label style="display:block; margin-bottom:0.5rem; font-weight:bold;">Urgency *</label>
                <select name="urgency" required style="width:100%; padding:0.75rem; border:1px solid #ddd; border-radius:4px;">
                    {% for value, label in urgency_choices %}
                    <option value="{{ value }}">{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        {% if diagnoses %}
        <div style="margin-bottom:1.25rem;">
            <label style="display:block; margin-bottom:0.5rem; font-weight:bold;">Link to Diagnosis (Optional)</label>
            <select name="diagnosis" style="width:100%; padding:0.75rem; border:1px solid #ddd; border-radius:4px;">
                <option value="">-- Select Diagnosis --</option>
                {% for d in diagnoses %}
                <option value="{{ d.id }}">{{ d.condition }} ({{ d.diagnosis_date }})</option>
                {% endfor %}
            </select>
        </div>
        {% endif %}

        <div style="margin-bottom:1.25rem;">
            <label style="display:block; margin-bottom:0.5rem; font-weight:bold;">Instructions for Lab</label>
            <textarea name="instructions" rows="3" placeholder="e.g., Fasting required, morning sample only..."
                      style="width:100%; padding:0.75rem; border:1px solid #ddd; border-radius:4px;"></textarea>
        </div>

        <div style="margin-bottom:1.5rem;">
            <label style="display:block; margin-bottom:0.5rem; font-weight:bold;">Additional Notes</label>
            <textarea name="notes" rows="2" style="width:100%; padding:0.75rem; border:1px solid #ddd; border-radius:4px;"></textarea>
        </div>

        <div style="display:flex; gap:1rem; justify-content:flex-end;">
            <a href="{% url 'records:patient_detail' patient.patient_id %}"
               style="padding:0.75rem 2rem; background:#95a5a6; color:white; text-decoration:none; border-radius:4px; font-weight:bold;">Cancel</a>
            <button type="submit" style="padding:0.75rem 2rem; background:#3498db; color:white; border:none; border-radius:4px; font-weight:bold; cursor:pointer;">
                📋 Order Test
            </button>
        </div>
    </form>
</div>
{% endblock %}
