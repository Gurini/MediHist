{% extends 'Users/base.html' %}

{% block title %}Add New Patient - Medihist{% endblock %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 2rem auto;">
    <h2 style="color: #2c3e50; margin-bottom: 2rem;">Add New Patient</h2>
    
    <form method="post">
        {% csrf_token %}
        
        <!-- Basic Information -->
        <fieldset style="border: 1px solid #ecf0f1; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem;">
            <legend style="font-weight: bold; color: #2c3e50; padding: 0 0.5rem;">Basic Information</legend>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                <div>
                    <label for="first_name" style="display: block; margin-bottom: 0.5rem; font-weight: bold;">First Name *</label>
                    <input type="text" name="first_name" id="first_name" required
                           style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
                </div>
                <div>
                    <label for="last_name" style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Last Name *</label>
                    <input type="text" name="last_name" id="last_name" required
                           style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
                </div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                <div>
                    <label for="date_of_birth" style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Date of Birth *</label>
                    <input type="date" name="date_of_birth" id="date_of_birth" required
                           style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
                </div>
                <div>
                    <label for="gender" style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Gender *</label>
                    <select name="gender" id="gender" required
                            style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
                        <option value="">Select...</option>
                        <option value="M">Male</option>
                        <option value="F">Female</option>
                        <option value="O">Other</option>
                    </select>
                </div>
                <div>
                    <label for="blood_group" style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Blood Group</label>
                    <select name="blood_group" id="blood_group"
                            style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
                        <option value="">Select...</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                    </select>
                </div>
            </div>
        </fieldset>
        
        <!-- Contact Information -->
        <fieldset style="border: 1px solid #ecf0f1; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem;">
            <legend style="font-weight: bold; color: #2c3e50; padding: 0 0.5rem;">Contact Information</legend>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                <div>
                    <label for="phone_number" style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Phone Number *</label>
                    <input type="tel" name="phone_number" id="phone_number" required placeholder="+1234567890"
                           style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
                </div>
                <div>
                    <label for="email" style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Email</label>
                    <input type="email" name="email" id="email"
                           style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
                </div>
            </div>
            
            <div>
                <label for="address" style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Address *</label>
                <textarea name="address" id="address" rows="3" required
                          style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;"></textarea>
            </div>
        </fieldset>
        
        <!-- Emergency Contact -->
        <fieldset style="border: 1px solid #ecf0f1; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem;">
            <legend style="font-weight: bold; color: #2c3e50; padding: 0 0.5rem;">Emergency Contact</legend>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
                <div>
                    <label for="emergency_contact_name" style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Name *</label>
                    <input type="text" name="emergency_contact_name" id="emergency_contact_name" required
                           style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
                </div>
                <div>
                    <label for="emergency_contact_phone" style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Phone *</label>
                    <input type="tel" name="emergency_contact_phone" id="emergency_contact_phone" required
                           style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
                </div>
                <div>
                    <label for="emergency_contact_relation" style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Relation *</label>
                    <input type="text" name="emergency_contact_relation" id="emergency_contact_relation" required placeholder="e.g., Spouse, Parent"
                           style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
                </div>
            </div>
        </fieldset>
        
        <!-- Medical Information -->
        <fieldset style="border: 1px solid #ecf0f1; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem;">
            <legend style="font-weight: bold; color: #2c3e50; padding: 0 0.5rem;">Medical Information</legend>
            
            <div style="margin-bottom: 1rem;">
                <label for="allergies" style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Known Allergies</label>
                <textarea name="allergies" id="allergies" rows="2" placeholder="List any known allergies (medications, food, etc.)"
                          style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;"></textarea>
            </div>
            
            <div>
                <label for="chronic_conditions" style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Chronic Conditions</label>
                <textarea name="chronic_conditions" id="chronic_conditions" rows="2" placeholder="List any chronic conditions (diabetes, hypertension, etc.)"
                          style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;"></textarea>
            </div>
        </fieldset>
        
        <!-- Form Actions -->
        <div style="display: flex; gap: 1rem; justify-content: flex-end;">
            <a href="{% url 'records:patient_list' %}" 
               style="padding: 0.75rem 2rem; background: #95a5a6; color: white; text-decoration: none; border-radius: 4px; font-weight: bold;">
                Cancel
            </a>
            <button type="submit"
                    style="padding: 0.75rem 2rem; background: #27ae60; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">
                Create Patient
            </button>
        </div>
    </form>
</div>
{% endblock %}
