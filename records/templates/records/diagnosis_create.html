{% extends 'Users/base.html' %}

{% block title %}Add Diagnosis - {{ patient.get_full_name }}{% endblock %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 2rem auto;">
    <h2 style="color: #e74c3c; margin-bottom: 1rem;">Add Diagnosis</h2>
    <p style="color: #7f8c8d; margin-bottom: 2rem;">Patient: <strong>{{ patient.get_full_name }}</strong> ({{ patient.patient_id }})</p>
    
    <form method="post">
        {% csrf_token %}
        
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Condition/Disease *</label>
                <input type="text" name="condition" required placeholder="e.g., Type 2 Diabetes Mellitus"
                       style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">ICD-10 Code</label>
                <input type="text" name="icd_code" placeholder="e.g., E11.9"
                       style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
            </div>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Diagnosis Date *</label>
                <input type="date" name="diagnosis_date" required value="{% now 'Y-m-d' %}"
                       style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Severity *</label>
                <select name="severity" required style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
                    <option value="MILD">Mild</option>
                    <option value="MODERATE" selected>Moderate</option>
                    <option value="SEVERE">Severe</option>
                    <option value="CRITICAL">Critical</option>
                </select>
            </div>
            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Status *</label>
                <select name="status" required style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
                    <option value="ACTIVE" selected>Active</option>
                    <option value="RESOLVED">Resolved</option>
                    <option value="CHRONIC">Chronic</option>
                    <option value="UNDER_OBSERVATION">Under Observation</option>
                </select>
            </div>
        </div>
        
        {% if medical_histories %}
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Link to Medical History (Optional)</label>
            <select name="medical_history" style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
                <option value="">-- Select Medical History Record --</option>
                {% for history in medical_histories %}
                <option value="{{ history.id }}">{{ history.date }} - {{ history.chief_complaint|truncatewords:8 }}</option>
                {% endfor %}
            </select>
        </div>
        {% endif %}
        
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Description *</label>
            <textarea name="description" rows="3" required placeholder="Detailed description of the diagnosis"
                      style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;"></textarea>
        </div>
        
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Symptoms</label>
            <textarea name="symptoms" rows="2" placeholder="List of symptoms"
                      style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;"></textarea>
        </div>
        
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Test Results</label>
            <textarea name="test_results" rows="2" placeholder="Relevant test results"
                      style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;"></textarea>
        </div>
        
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Treatment Plan</label>
            <textarea name="treatment_plan" rows="3" placeholder="Recommended treatment plan"
                      style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;"></textarea>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 1rem; margin-bottom: 1.5rem;">
            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Follow-up Date</label>
                <input type="date" name="follow_up_date"
                       style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Additional Notes</label>
                <textarea name="notes" rows="1"
                          style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;"></textarea>
            </div>
        </div>
        
        <div style="display: flex; gap: 1rem; justify-content: flex-end;">
            <a href="{% url 'records:patient_detail' patient.patient_id %}" 
               style="padding: 0.75rem 2rem; background: #95a5a6; color: white; text-decoration: none; border-radius: 4px; font-weight: bold;">
                Cancel
            </a>
            <button type="submit"
                    style="padding: 0.75rem 2rem; background: #e74c3c; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">
                Save Diagnosis
            </button>
        </div>
    </form>
</div>
{% endblock %}
