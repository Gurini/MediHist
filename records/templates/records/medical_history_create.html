{% extends 'users/base.html' %}

{% block title %}Add Medical History - {{ patient.get_full_name }}{% endblock %}

{% block content %}
<div class="card" style="max-width: 900px; margin: 2rem auto;">
    <h2 style="color: #2c3e50; margin-bottom: 1rem;">Add Medical History</h2>
    <p style="color: #7f8c8d; margin-bottom: 2rem;">Patient: <strong>{{ patient.get_full_name }}</strong> ({{ patient.patient_id }})</p>
    
    <form method="post">
        {% csrf_token %}
        
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Date *</label>
            <input type="date" name="date" required value="{% now 'Y-m-d' %}"
                   style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
        </div>
        
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Chief Complaint *</label>
            <textarea name="chief_complaint" rows="2" required placeholder="Main reason for visit"
                      style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;"></textarea>
        </div>
        
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Present Illness *</label>
            <textarea name="present_illness" rows="4" required placeholder="History of present illness"
                      style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;"></textarea>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Past Medical History</label>
                <textarea name="past_medical_history" rows="3"
                          style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;"></textarea>
            </div>
            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Family History</label>
                <textarea name="family_history" rows="3"
                          style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;"></textarea>
            </div>
        </div>
        
        <fieldset style="border: 1px solid #ecf0f1; padding: 1.5rem; border-radius: 8px; margin-bottom: 1.5rem;">
            <legend style="font-weight: bold;">Vital Signs</legend>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem;">
                <div>
                    <label style="display: block; margin-bottom: 0.5rem;">Temperature (°F)</label>
                    <input type="number" step="0.1" name="temperature" placeholder="98.6"
                           style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 0.5rem;">Blood Pressure</label>
                    <input type="text" name="blood_pressure" placeholder="120/80"
                           style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 0.5rem;">Pulse Rate (bpm)</label>
                    <input type="number" name="pulse_rate" placeholder="72"
                           style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 0.5rem;">Respiratory Rate</label>
                    <input type="number" name="respiratory_rate" placeholder="16"
                           style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 0.5rem;">Weight (kg)</label>
                    <input type="number" step="0.01" name="weight" placeholder="70.5"
                           style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 0.5rem;">Height (cm)</label>
                    <input type="number" step="0.01" name="height" placeholder="175"
                           style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
                </div>
            </div>
        </fieldset>
        
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Physical Examination</label>
            <textarea name="physical_examination" rows="4" placeholder="Physical examination findings"
                      style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;"></textarea>
        </div>
        
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Doctor's Notes</label>
            <textarea name="doctor_notes" rows="3"
                      style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;"></textarea>
        </div>
        
        <div style="display: flex; gap: 1rem; justify-content: flex-end;">
            <a href="{% url 'records:patient_detail' patient.patient_id %}" 
               style="padding: 0.75rem 2rem; background: #95a5a6; color: white; text-decoration: none; border-radius: 4px; font-weight: bold;">
                Cancel
            </a>
            <button type="submit"
                    style="padding: 0.75rem 2rem; background: #3498db; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">
                Save Medical History
            </button>
        </div>
    </form>
</div>
{% endblock %}
