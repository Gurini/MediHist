{% extends 'users/base.html' %}

{% block title %}Login - Medihist{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 2rem auto;">
    <h2 style="color: #2c3e50; margin-bottom: 1.5rem; text-align: center;">Login to Medihist</h2>
    
    <form method="post" style="display: flex; flex-direction: column;">
        {% csrf_token %}
        
        <div style="margin-bottom: 1.5rem;">
            <label for="username" style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Username</label>
            <input 
                type="text" 
                name="username" 
                id="username" 
                required
                style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem;"
            />
        </div>
        
        <div style="margin-bottom: 1.5rem;">
            <label for="password" style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Password</label>
            <input 
                type="password" 
                name="password" 
                id="password" 
                required
                style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem;"
            />
        </div>
        
        <button 
            type="submit"
            style="padding: 0.75rem; background: #3498db; color: white; border: none; border-radius: 4px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.3s;"
            onmouseover="this.style.background='#2980b9'"
            onmouseout="this.style.background='#3498db'"
        >
            Login
        </button>
    </form>
</div>
{% endblock %}
